# Monterey Peninsula feasibility-spike config.
#
# Keep this config small. It is intended for agent-safe development and smoke
# tests, not full West Coast processing.

data_root: /Volumes/x10pro/kelp_aef

region:
  name: monterey_peninsula
  display_name: Monterey Peninsula
  crs: EPSG:4326
  geometry:
    type: footprint_geojson
    path: /Volumes/x10pro/kelp_aef/geos/monterey_aef_10n_8192_8192_footprint.geojson
    source: alphaearth_tile_footprint
    source_tile_uri: s3://us-west-2.opendata.source.coop/tge-labs/aef/v1/annual/2022/10N/xaspzf5khdg4c5pbs-0000008192-0000008192.tiff

years:
  smoke: [2018, 2019, 2020, 2021, 2022]
  milestone: [2018, 2019, 2020, 2021, 2022]

labels:
  source: kelpwatch
  target: kelp_max_y
  aggregation: annual_max
  native_resolution_m: 30
  paths:
    raw_dir: /Volumes/x10pro/kelp_aef/raw/kelpwatch
    source_manifest: /Volumes/x10pro/kelp_aef/interim/kelpwatch_source_manifest.json
    annual_labels: /Volumes/x10pro/kelp_aef/interim/labels_annual.parquet
    annual_label_manifest: /Volumes/x10pro/kelp_aef/interim/labels_annual_manifest.json

features:
  source: alphaearth
  product: aef_v1_annual
  provider: source_cooperative
  bucket: us-west-2.opendata.source.coop
  s3_prefix: tge-labs/aef/v1/annual
  utm_grid: 10N
  bands: A00-A63
  native_resolution_m: 10
  target_resolution_m: 30
  aggregation: mean_to_kelpwatch_grid
  catalog:
    url: https://data.source.coop/tge-labs/aef/v1/annual/aef_index_stac_geoparquet.parquet
    visual_qa_url: https://developmentseed.org/stac-map/?href=https://data.source.coop/tge-labs/aef/v1/annual/aef_index_stac_geoparquet.parquet
    layer_name: aef_index_stac_geoparquet
    selection_policy: max_overlap_per_year
    min_footprint_overlap_fraction: 0.5
  paths:
    local_mirror_root: /Volumes/x10pro/kelp_aef/raw/aef
    catalog_query: /Volumes/x10pro/kelp_aef/interim/aef_monterey_catalog_query.parquet
    catalog_query_summary: /Volumes/x10pro/kelp_aef/interim/aef_monterey_catalog_query_summary.json
    tile_manifest: /Volumes/x10pro/kelp_aef/interim/aef_monterey_tile_manifest.json
    feature_table: /Volumes/x10pro/kelp_aef/interim/aef_samples.parquet
  known_tiles:
    2018:
      source_uri: s3://us-west-2.opendata.source.coop/tge-labs/aef/v1/annual/2018/10N/xdz8z3a9znk5b1j75-0000008192-0000008192.tiff
      local_path: /Volumes/x10pro/kelp_aef/raw/aef/v1/annual/2018/10N/xdz8z3a9znk5b1j75-0000008192-0000008192.tiff
    2022:
      source_uri: s3://us-west-2.opendata.source.coop/tge-labs/aef/v1/annual/2022/10N/xaspzf5khdg4c5pbs-0000008192-0000008192.tiff
      local_path: /Volumes/x10pro/kelp_aef/raw/aef/v1/annual/2022/10N/xaspzf5khdg4c5pbs-0000008192-0000008192.tiff

alignment:
  method: rasterio_average_10m_to_30m
  target_row_chunk_size: 256
  output_table: /Volumes/x10pro/kelp_aef/interim/aligned_training_table.parquet
  output_manifest: /Volumes/x10pro/kelp_aef/interim/aligned_training_table_manifest.json
  summary_table: /Volumes/x10pro/kelp_aef/reports/tables/aligned_training_table_summary.csv
  fast:
    years: [2022]
    max_stations: 500
    output_table: /Volumes/x10pro/kelp_aef/interim/aligned_training_table.fast.parquet
    output_manifest: /Volumes/x10pro/kelp_aef/interim/aligned_training_table.fast_manifest.json
    summary_table: /Volumes/x10pro/kelp_aef/reports/tables/aligned_training_table.fast_summary.csv
    comparison_table: /Volumes/x10pro/kelp_aef/reports/tables/aligned_training_table.fast_method_comparison.csv
  split_manifest: /Volumes/x10pro/kelp_aef/interim/split_manifest.parquet

splits:
  primary: year_holdout
  train_years: [2018, 2019, 2020]
  validation_years: [2021]
  test_years: [2022]
  output_manifest: /Volumes/x10pro/kelp_aef/interim/split_manifest.parquet

models:
  initial:
    - ridge_regression
  output_dir: /Volumes/x10pro/kelp_aef/models
  baselines:
    target: kelp_fraction_y
    features: A00-A63
    alpha_grid: [0.01, 0.1, 1.0, 10.0, 100.0]
    drop_missing_features: true
    ridge_model: /Volumes/x10pro/kelp_aef/models/baselines/ridge_kelp_fraction.joblib
    predictions: /Volumes/x10pro/kelp_aef/processed/baseline_predictions.parquet
    metrics: /Volumes/x10pro/kelp_aef/reports/tables/baseline_metrics.csv
    manifest: /Volumes/x10pro/kelp_aef/interim/baseline_eval_manifest.json

reports:
  figures_dir: /Volumes/x10pro/kelp_aef/reports/figures
  tables_dir: /Volumes/x10pro/kelp_aef/reports/tables
  map_residuals:
    model_name: ridge_regression
    split: test
    year: 2022
    latitude_band_count: 12
    top_residual_count: 50
  outputs:
    metadata_summary: /Volumes/x10pro/kelp_aef/interim/metadata_summary.json
    sample_qa_figure: /Volumes/x10pro/kelp_aef/reports/figures/sample_kelpwatch_vs_aef.png
    predicted_map: /Volumes/x10pro/kelp_aef/reports/figures/predicted_map.png
    residual_map: /Volumes/x10pro/kelp_aef/reports/figures/residual_map.png
    area_bias_summary: /Volumes/x10pro/kelp_aef/reports/tables/area_bias_summary.csv
    ridge_observed_predicted_residual_map: /Volumes/x10pro/kelp_aef/reports/figures/ridge_2022_observed_predicted_residual.png
    ridge_observed_vs_predicted: /Volumes/x10pro/kelp_aef/reports/figures/ridge_observed_vs_predicted.png
    ridge_residual_interactive: /Volumes/x10pro/kelp_aef/reports/figures/ridge_2022_residual_interactive.html
    area_bias_by_year: /Volumes/x10pro/kelp_aef/reports/tables/area_bias_by_year.csv
    area_bias_by_latitude_band: /Volumes/x10pro/kelp_aef/reports/tables/area_bias_by_latitude_band.csv
    top_residual_stations: /Volumes/x10pro/kelp_aef/reports/tables/top_residual_stations.csv
    map_residuals_manifest: /Volumes/x10pro/kelp_aef/interim/map_residuals_manifest.json

runtime:
  max_cells: 250000
  fail_if_data_root_missing: true
