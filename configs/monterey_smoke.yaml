# Monterey Peninsula feasibility-spike config.
#
# Keep this config small. It is intended for agent-safe development and smoke
# tests, not full West Coast processing.

data_root: /Volumes/x10pro/kelp_aef

region:
  name: monterey_peninsula
  crs: EPSG:4326
  geometry:
    path: /Volumes/x10pro/kelp_aef/geos/monterey_aef_10n_8192_8192_footprint.geojson
    source_tile_uri: s3://us-west-2.opendata.source.coop/tge-labs/aef/v1/annual/2022/10N/xaspzf5khdg4c5pbs-0000008192-0000008192.tiff

years:
  smoke: [2018, 2019, 2020, 2021, 2022]

labels:
  target: kelp_max_y
  aggregation: annual_max
  native_resolution_m: 30
  paths:
    raw_dir: /Volumes/x10pro/kelp_aef/raw/kelpwatch
    source_manifest: /Volumes/x10pro/kelp_aef/interim/kelpwatch_source_manifest.json
    annual_labels: /Volumes/x10pro/kelp_aef/interim/labels_annual.parquet
    annual_label_manifest: /Volumes/x10pro/kelp_aef/interim/labels_annual_manifest.json

features:
  s3_prefix: tge-labs/aef/v1/annual
  utm_grid: 10N
  bands: A00-A63
  native_resolution_m: 10
  catalog:
    url: https://data.source.coop/tge-labs/aef/v1/annual/aef_index_stac_geoparquet.parquet
    layer_name: aef_index_stac_geoparquet
    selection_policy: max_overlap_per_year
    min_footprint_overlap_fraction: 0.5
  paths:
    local_mirror_root: /Volumes/x10pro/kelp_aef/raw/aef
    catalog_query: /Volumes/x10pro/kelp_aef/interim/aef_monterey_catalog_query.parquet
    catalog_query_summary: /Volumes/x10pro/kelp_aef/interim/aef_monterey_catalog_query_summary.json
    tile_manifest: /Volumes/x10pro/kelp_aef/interim/aef_monterey_tile_manifest.json
  # Documentation-only examples from the first manual/source discovery pass.
  known_tiles:
    2018:
      source_uri: s3://us-west-2.opendata.source.coop/tge-labs/aef/v1/annual/2018/10N/xdz8z3a9znk5b1j75-0000008192-0000008192.tiff
    2022:
      source_uri: s3://us-west-2.opendata.source.coop/tge-labs/aef/v1/annual/2022/10N/xaspzf5khdg4c5pbs-0000008192-0000008192.tiff

alignment:
  method: rasterio_average_10m_to_30m
  target_row_chunk_size: 256
  output_table: /Volumes/x10pro/kelp_aef/interim/aligned_training_table.parquet
  output_manifest: /Volumes/x10pro/kelp_aef/interim/aligned_training_table_manifest.json
  summary_table: /Volumes/x10pro/kelp_aef/reports/tables/aligned_training_table_summary.csv
  full_grid:
    output_table: /Volumes/x10pro/kelp_aef/interim/aligned_full_grid_training_table.parquet
    output_manifest: /Volumes/x10pro/kelp_aef/interim/aligned_full_grid_training_table_manifest.json
    summary_table: /Volumes/x10pro/kelp_aef/reports/tables/aligned_full_grid_training_table_summary.csv
    target_row_chunk_size: 128
    fast:
      years: [2022]
      row_window: [2560, 2688]
      col_window: [512, 640]
      output_table: /Volumes/x10pro/kelp_aef/interim/aligned_full_grid_training_table.fast.parquet
      output_manifest: /Volumes/x10pro/kelp_aef/interim/aligned_full_grid_training_table.fast_manifest.json
      summary_table: /Volumes/x10pro/kelp_aef/reports/tables/aligned_full_grid_training_table.fast_summary.csv
  background_sample:
    output_table: /Volumes/x10pro/kelp_aef/interim/aligned_background_sample_training_table.parquet
    output_manifest: /Volumes/x10pro/kelp_aef/interim/aligned_background_sample_training_table_manifest.json
    summary_table: /Volumes/x10pro/kelp_aef/reports/tables/aligned_background_sample_training_table_summary.csv
    random_seed: 13
    background_rows_per_year: 250000
    include_all_kelpwatch_observed: true
  fast:
    years: [2022]
    max_stations: 500
    output_table: /Volumes/x10pro/kelp_aef/interim/aligned_training_table.fast.parquet
    output_manifest: /Volumes/x10pro/kelp_aef/interim/aligned_training_table.fast_manifest.json
    summary_table: /Volumes/x10pro/kelp_aef/reports/tables/aligned_training_table.fast_summary.csv
    comparison_table: /Volumes/x10pro/kelp_aef/reports/tables/aligned_training_table.fast_method_comparison.csv

splits:
  train_years: [2018, 2019, 2020]
  validation_years: [2021]
  test_years: [2022]
  output_manifest: /Volumes/x10pro/kelp_aef/interim/split_manifest.parquet

models:
  baselines:
    input_table: /Volumes/x10pro/kelp_aef/interim/aligned_background_sample_training_table.parquet
    inference_table: /Volumes/x10pro/kelp_aef/interim/aligned_full_grid_training_table.parquet
    target: kelp_fraction_y
    features: A00-A63
    alpha_grid: [0.01, 0.1, 1.0, 10.0, 100.0]
    drop_missing_features: true
    use_sample_weight: false
    ridge_model: /Volumes/x10pro/kelp_aef/models/baselines/ridge_kelp_fraction.joblib
    sample_predictions: /Volumes/x10pro/kelp_aef/processed/baseline_sample_predictions.parquet
    predictions: /Volumes/x10pro/kelp_aef/processed/baseline_full_grid_predictions.parquet
    prediction_manifest: /Volumes/x10pro/kelp_aef/interim/baseline_full_grid_prediction_manifest.json
    metrics: /Volumes/x10pro/kelp_aef/reports/tables/baseline_metrics.csv
    manifest: /Volumes/x10pro/kelp_aef/interim/baseline_eval_manifest.json

reports:
  figures_dir: /Volumes/x10pro/kelp_aef/reports/figures
  tables_dir: /Volumes/x10pro/kelp_aef/reports/tables
  map_residuals:
    model_name: ridge_regression
    split: test
    year: 2022
    latitude_band_count: 12
    top_residual_count: 50
  model_analysis:
    model_name: ridge_regression
    split: test
    year: 2022
    report_dir: /Volumes/x10pro/kelp_aef/reports/model_analysis
    observed_area_bins: [0, 1, 90, 225, 450, 810, 900]
    threshold_fractions: [0, 0.01, 0.05, 0.10, 0.50, 0.90]
    latitude_band_count: 12
    max_projection_rows: 50000
    fall_quarter: 4
    winter_quarter: 1
  outputs:
    metadata_summary: /Volumes/x10pro/kelp_aef/interim/metadata_summary.json
    ridge_observed_predicted_residual_map: /Volumes/x10pro/kelp_aef/reports/figures/ridge_2022_observed_predicted_residual.png
    ridge_observed_vs_predicted: /Volumes/x10pro/kelp_aef/reports/figures/ridge_observed_vs_predicted.png
    ridge_residual_interactive: /Volumes/x10pro/kelp_aef/reports/figures/ridge_2022_residual_interactive.html
    area_bias_by_year: /Volumes/x10pro/kelp_aef/reports/tables/area_bias_by_year.csv
    area_bias_by_latitude_band: /Volumes/x10pro/kelp_aef/reports/tables/area_bias_by_latitude_band.csv
    top_residual_stations: /Volumes/x10pro/kelp_aef/reports/tables/top_residual_stations.csv
    map_residuals_manifest: /Volumes/x10pro/kelp_aef/interim/map_residuals_manifest.json
    model_analysis_report: /Volumes/x10pro/kelp_aef/reports/model_analysis/monterey_phase0_model_analysis.md
    model_analysis_html_report: /Volumes/x10pro/kelp_aef/reports/model_analysis/monterey_phase0_model_analysis.html
    model_analysis_manifest: /Volumes/x10pro/kelp_aef/interim/model_analysis_manifest.json
    model_analysis_label_distribution_by_stage: /Volumes/x10pro/kelp_aef/reports/tables/model_analysis_label_distribution_by_stage.csv
    model_analysis_target_framing_summary: /Volumes/x10pro/kelp_aef/reports/tables/model_analysis_target_framing_summary.csv
    model_analysis_residual_by_observed_bin: /Volumes/x10pro/kelp_aef/reports/tables/model_analysis_residual_by_observed_bin.csv
    model_analysis_residual_by_persistence: /Volumes/x10pro/kelp_aef/reports/tables/model_analysis_residual_by_persistence.csv
    model_analysis_prediction_distribution: /Volumes/x10pro/kelp_aef/reports/tables/model_analysis_prediction_distribution.csv
    model_analysis_threshold_sensitivity: /Volumes/x10pro/kelp_aef/reports/tables/model_analysis_threshold_sensitivity.csv
    model_analysis_spatial_holdout_readiness: /Volumes/x10pro/kelp_aef/reports/tables/model_analysis_spatial_holdout_readiness.csv
    model_analysis_feature_separability: /Volumes/x10pro/kelp_aef/reports/tables/model_analysis_feature_separability.csv
    model_analysis_phase1_decision_matrix: /Volumes/x10pro/kelp_aef/reports/tables/model_analysis_phase1_decision_matrix.csv
    model_analysis_quarter_mapping: /Volumes/x10pro/kelp_aef/reports/tables/model_analysis_quarter_mapping.csv
    model_analysis_label_distribution_figure: /Volumes/x10pro/kelp_aef/reports/figures/model_analysis_label_distribution_by_stage.png
    model_analysis_observed_predicted_figure: /Volumes/x10pro/kelp_aef/reports/figures/model_analysis_observed_vs_predicted_distribution.png
    model_analysis_residual_by_bin_figure: /Volumes/x10pro/kelp_aef/reports/figures/model_analysis_residual_by_observed_bin.png
    model_analysis_observed_900_figure: /Volumes/x10pro/kelp_aef/reports/figures/model_analysis_observed_900_predictions.png
    model_analysis_residual_by_persistence_figure: /Volumes/x10pro/kelp_aef/reports/figures/model_analysis_residual_by_persistence.png
    model_analysis_alternative_targets_figure: /Volumes/x10pro/kelp_aef/reports/figures/model_analysis_alternative_target_framings.png
    model_analysis_feature_projection_figure: /Volumes/x10pro/kelp_aef/reports/figures/model_analysis_feature_projection.png
    model_analysis_spatial_readiness_figure: /Volumes/x10pro/kelp_aef/reports/figures/model_analysis_spatial_holdout_readiness.png
